name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/openclaw
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart openclaw || pm2 start dist/index.js --name openclaw -- gateway --verbose
            pm2 save
